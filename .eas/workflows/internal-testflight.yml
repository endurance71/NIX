name: Internal TestFlight — NiX Internal QA

on:
  workflow_dispatch: {}

jobs:
  checks:
    name: Internal TestFlight quality gates
    environment: production
    runs_on: linux-medium
    steps:
      - uses: eas/checkout
      - name: Verify checked-out source is immutable
        run: |
          # Pełny checkout z --ref: wymagaj czystego drzewa.
          # Upload archiwum (brak powiązanego repo): .easignore usuwa tracked pliki
          # (docs/, supabase/, *.md, .cursor) — wtedy git diff byłby fałszywie brudny.
          if git rev-parse --is-inside-work-tree >/dev/null 2>&1 && [ -n "${EAS_BUILD_GIT_COMMIT_HASH:-}" ]; then
            git diff --exit-code
            git diff --cached --exit-code
          else
            echo "Skipping strict git cleanliness for archive-based workflow uploads."
          fi
      - uses: eas/install_node_modules
      - name: Typecheck
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Unit tests
        run: npm run test
      - name: Dead code
        run: npm run check-knip
      - name: Expo Doctor
        run: npm run expo-doctor
      - name: Expo dependency alignment
        run: npm run expo-install-check
      - name: Native iOS configuration
        run: npm run check:ios-config
      - name: Sentry hard-off policy
        run: npm run check:sentry-disabled
      - name: Supabase migration safety
        run: npm run check:supabase-migrations
      - name: Edge Functions typecheck
        run: npm run deno:check
      - name: Edge Functions tests
        run: npm run deno:test
      - name: React Doctor (full, zero warnings)
        run: npm run doctor:react:ci
      - name: React Doctor (new issues)
        run: npm run doctor:react:changed -- --base HEAD~1 --blocking error --no-score
      - name: Internal TestFlight configuration
        run: npm run check:internal-testflight-config
      - name: Hermes production export
        run: npm run export:production

  paid_build_approval:
    name: Approve paid signed build from this SHA
    needs: [checks]
    type: require-approval

  build_ios:
    name: Signed iOS store build
    needs: [paid_build_approval]
    type: build
    params:
      platform: ios
      profile: production

  distribute_internal:
    name: Distribute only to NiX Internal QA
    needs: [build_ios]
    type: testflight
    params:
      build_id: ${{ needs.build_ios.outputs.build_id }}
      profile: production
      internal_groups: ['NiX Internal QA']
      submit_beta_review: false
      wait_processing_timeout_seconds: 1800
